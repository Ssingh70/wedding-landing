                        <form id="rsvpForm" class="rsvp-form">
                            <div class="rsvp-field">
                                <input id="name" type="text" name="name"
                                    placeholder="Full Name *" required>
                            </div>

                            <div class="rsvp-field">
                                <input id="email" type="email" name="email"
                                    placeholder="Email (optional)">
                            </div>

                            <div class="rsvp-field">
                                <label class="attend-label">Will you attend?</label>

                                <div class="rsvp-buttons">

                                    <label>
                                        <input type="radio"
                                            name="attendance"
                                            value="Yes"
                                            required
                                            hidden
                                            checked>
                                        <span class="btn-style">Yes</span>
                                    </label>

                                    <label>
                                        <input type="radio"
                                            name="attendance"
                                            value="No"
                                            hidden>
                                        <span class="btn-style">No</span>
                                    </label>

                                </div>
                            </div>

                            <div class="rsvp-field">
                                <textarea id="message"
                                    name="message"
                                    rows="3"
                                    placeholder="Your message..."></textarea>
                            </div>

                            <button type="submit"
                                class="rsvp-submit">
                                Confirm
                            </button>

                        </form>
                        <div id="rsvp-success"></div>
